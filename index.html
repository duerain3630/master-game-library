<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nico's Video Game Database</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #0f0f14;
        color: #ffffff;
    }

    header {
        padding: 30px;
        text-align: center;
        background: #1a1a24;
    }

    h1 {
        margin: 0;
        font-size: 32px;
    }

    .search-wrapper {
        position: relative;
        max-width: 600px;
        margin: auto;
    }
    
    #searchInput {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }
    
    .search-results {
        position: absolute;
        top: 45px;
        left: 0;
        right: 0;
        background: #1f1f2b;
        border-radius: 8px;
        overflow: hidden;
        z-index: 1000;
        display: none;
    }
    
    .search-item {
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #2a2a3a;
    }
    
    .search-item:hover {
        background: #2b2b3d;
    }
    
    .search-category {
        font-size: 12px;
        opacity: 0.6;
    }

    .stats {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 20px;
        flex-wrap: wrap;
    }

    .stat-box {
        background: #1f1f2b;
        padding: 15px 20px;
        border-radius: 10px;
        min-width: 120px;
        text-align: center;
    }

    .section {
        padding: 20px;
        text-align: center;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }

    .card {
        background: #1f1f2b;
        padding: 20px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        text-decoration: none;
        color: white;
    }

    .card:hover {
        background: #2a2a3a;
        transform: translateY(-2px);
    }

    #results {
        max-width: 900px;
        margin: auto;
        padding: 10px;
    }

    .result-item {
        background: #1f1f2b;
        margin: 5px 0;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
    }

    .result-item:hover {
        background: #2a2a3a;
    }
</style>
</head>

<body>

<header>
    <h1>🎮 Nico's Video Game Database</h1>
    
    <div class="search-wrapper">
    <input id="searchInput" placeholder="Search games, developers, franchises..." />
    <div id="searchResults" class="search-results"></div>

</div>
</header>

<div class="stats" id="stats"></div>

<div class="section">
    <h2>Browse</h2>

    <div class="grid">
        <div class="grid">
        
        <a class="card" href="browse.html?type=games">
        🎮<br><br>Games
        </a>
        
        <a class="card" href="browse.html?type=platforms">
        🕹<br><br>Platforms
        </a>
        
        <a class="card" href="browse.html?type=developers">
        🏢<br><br>Developers
        </a>
        
        <a class="card" href="browse.html?type=publishers">
        📚<br><br>Publishers
        </a>
        
        <a class="card" href="browse.html?type=genres">
        🎲<br><br>Genres
        </a>
        
        <a class="card" href="browse.html?type=franchises">
        🧬<br><br>Franchises
        </a>
        
        <a class="card" href="browse.html?type=years">
        📅<br><br>Years
        </a>
        
        </div>
</div>

<div id="results"></div>

<script>
let database = null;

fetch("database.json")
    .then(res => res.json())
    .then(data => {
        database = data;
        renderStats(data);
    });

function renderStats(data) {
    const stats = document.getElementById("stats");

    stats.innerHTML = `
        <div class="stat-box">Games<br><strong>${data.games.length}</strong></div>
        <div class="stat-box">Platforms<br><strong>${data.platforms.length}</strong></div>
        <div class="stat-box">Developers<br><strong>${data.developers.length}</strong></div>
        <div class="stat-box">Publishers<br><strong>${data.publishers.length}</strong></div>
        <div class="stat-box">Franchises<br><strong>${data.franchises.length}</strong></div>
        <div class="stat-box">Genres<br><strong>${data.genres.length}</strong></div>
    `;
}

document.getElementById("search").addEventListener("input", function(e) {
    const query = e.target.value.toLowerCase();
    const results = document.getElementById("results");

    if (!database || query.length < 2) {
        results.innerHTML = "";
        return;
    }

    let db = null;

fetch("database.json")
.then(res => res.json())
.then(data => {
    db = data;
});

const input = document.getElementById("searchInput");
const resultsBox = document.getElementById("searchResults");

input.addEventListener("input", () => {

    const query = input.value.toLowerCase().trim();

    if (!query || !db) {
        resultsBox.style.display = "none";
        return;
    }

    const results = [];

    // --------------------
    // SEARCH GAMES
    // --------------------
    db.games.forEach(g => {
        if (g.title.toLowerCase().includes(query)) {
            results.push({
                type: "game",
                name: g.title,
                id: g.id,
                link: `game.html?id=${g.id}`
            });
        }
    });

    // --------------------
    // DEVELOPERS
    // --------------------
    db.developers.forEach(d => {
        if (d.name.toLowerCase().includes(query)) {
            results.push({
                type: "developer",
                name: d.name,
                id: d.id,
                link: `entity.html?type=developer&id=${d.id}`
            });
        }
    });

    // --------------------
    // PUBLISHERS
    // --------------------
    db.publishers.forEach(p => {
        if (p.name.toLowerCase().includes(query)) {
            results.push({
                type: "publisher",
                name: p.name,
                id: p.id,
                link: `entity.html?type=publisher&id=${p.id}`
            });
        }
    });

    // --------------------
    // FRANCHISES
    // --------------------
    db.franchises.forEach(f => {
        if (f.name.toLowerCase().includes(query)) {
            results.push({
                type: "franchise",
                name: f.name,
                id: f.id,
                link: `entity.html?type=franchise&id=${f.id}`
            });
        }
    });

    // --------------------
    // PLATFORMS
    // --------------------
    db.platforms.forEach(p => {
        if (p.name.toLowerCase().includes(query)) {
            results.push({
                type: "platform",
                name: p.name,
                id: p.id,
                link: `entity.html?type=platform&id=${p.id}`
            });
        }
    });

    renderResults(results.slice(0, 10));
});


function renderResults(results) {

    if (results.length === 0) {
        resultsBox.style.display = "none";
        return;
    }

    resultsBox.style.display = "block";

    resultsBox.innerHTML = results.map(r => `
        <a href="${r.link}" class="search-item">
            <div class="search-category">${r.type}</div>
            <div>${r.name}</div>
        </a>
    `).join("");
}
});
</script>

</body>
</html>
