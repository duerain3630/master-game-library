<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nico's Video Game Database</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #0f0f14;
        color: #ffffff;
    }

    header {
        padding: 30px;
        text-align: center;
        background: #1a1a24;
    }

    h1 {
        margin: 0;
        font-size: 32px;
    }

    .search-wrapper {
        position: relative;
        max-width: 600px;
        margin: auto;
    }

    #searchInput {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }

    .search-results {
        position: absolute;
        top: 45px;
        left: 0;
        right: 0;
        background: #1f1f2b;
        border-radius: 8px;
        overflow: hidden;
        z-index: 1000;
        display: none;
    }

    .search-item {
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #2a2a3a;
        text-decoration: none;
        color: white;
        display: block;
    }

    .search-item:hover {
        background: #2b2b3d;
    }

    .search-category {
        font-size: 12px;
        opacity: 0.6;
    }

    .stats {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 20px;
        flex-wrap: wrap;
    }

    .stat-box {
        background: #1f1f2b;
        padding: 15px 20px;
        border-radius: 10px;
        min-width: 120px;
        text-align: center;
    }

    .section {
        padding: 20px;
        text-align: center;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }

    .card {
        background: #1f1f2b;
        padding: 20px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        text-decoration: none;
        color: white;
    }

    .card:hover {
        background: #2a2a3a;
        transform: translateY(-2px);
    }
</style>
</head>

<body>

<header>
    <h1>🎮 Nico's Video Game Database</h1>

    <div class="search-wrapper">
        <input id="searchInput" placeholder="Search games, developers, franchises..." />
        <div id="searchResults" class="search-results"></div>
    </div>
</header>

<div class="stats" id="stats"></div>

<div class="section">
    <h2>Browse</h2>

    <div class="grid">

        <a class="card" href="browse.html?type=games">🎮<br><br>Games</a>
        <a class="card" href="browse.html?type=platforms">🕹<br><br>Platforms</a>
        <a class="card" href="browse.html?type=developers">🏢<br><br>Developers</a>
        <a class="card" href="browse.html?type=publishers">📚<br><br>Publishers</a>
        <a class="card" href="browse.html?type=genres">🎲<br><br>Genres</a>
        <a class="card" href="browse.html?type=franchises">🧬<br><br>Franchises</a>
        <a class="card" href="browse.html?type=years">📅<br><br>Years</a>

    </div>
</div>

<script>
    
let database = null;

const input = document.getElementById("searchInput");
const resultsBox = document.getElementById("searchResults");
const typeIcons = {
    game: "🎮 Game",
    developer: "🏢 Developer",
    publisher: "📚 Publisher",
    franchise: "🧬 Franchise",
    platform: "🕹 Platform"
    
};
    
/* -----------------------------
   LOAD DATABASE
----------------------------- */
fetch("database.json")
    .then(res => res.json())
    .then(data => {
        database = data;
        renderStats(data);
    });

/* -----------------------------
   STATS
----------------------------- */
function renderStats(data) {
    document.getElementById("stats").innerHTML = `
        <div class="stat-box">Games<br><strong>${data.games.length}</strong></div>
        <div class="stat-box">Platforms<br><strong>${data.platforms.length}</strong></div>
        <div class="stat-box">Developers<br><strong>${data.developers.length}</strong></div>
        <div class="stat-box">Publishers<br><strong>${data.publishers.length}</strong></div>
        <div class="stat-box">Franchises<br><strong>${data.franchises.length}</strong></div>
        <div class="stat-box">Genres<br><strong>${data.genres.length}</strong></div>
    `;
}

/* -----------------------------
   SEARCH LOGIC
----------------------------- */
input.addEventListener("input", () => {

    const query = input.value.toLowerCase().trim();

    if (!database || query.length < 2) {
        resultsBox.style.display = "none";
        return;
    }

    const results = [];

    /* GAMES */
    database.games.forEach(g => {
        if (g.title.toLowerCase().includes(query)) {
            results.push({
                type: "game",
                name: g.title,
                link: `game.html?id=${g.id}`
            });
        }
    });

    /* DEVELOPERS */
    database.developers.forEach(d => {
        if (d.name.toLowerCase().includes(query)) {
            results.push({
                type: "developer",
                name: d.name,
                link: `entity.html?type=developer&id=${d.id}`
            });
        }
    });

    /* PUBLISHERS */
    database.publishers.forEach(p => {
        if (p.name.toLowerCase().includes(query)) {
            results.push({
                type: "publisher",
                name: p.name,
                link: `entity.html?type=publisher&id=${p.id}`
            });
        }
    });

    /* FRANCHISES */
    database.franchises.forEach(f => {
        if (f.name.toLowerCase().includes(query)) {
            results.push({
                type: "franchise",
                name: f.name,
                link: `entity.html?type=franchise&id=${f.id}`
            });
        }
    });

    /* PLATFORMS */
    database.platforms.forEach(p => {
        if (p.name.toLowerCase().includes(query)) {
            results.push({
                type: "platform",
                name: p.name,
                link: `entity.html?type=platform&id=${p.id}`
            });
        }
    });

    renderResults(results);
});

/* -----------------------------
   RENDER RESULTS
----------------------------- */
function renderResults(results) {

    if (!results.length) {
        resultsBox.style.display = "none";
        return;
    }

    resultsBox.style.display = "block";

    const groups = {
        game: [],
        developer: [],
        publisher: [],
        franchise: [],
        platform: []
    };

    results.forEach(r => {
        if (groups[r.type]) {
            groups[r.type].push(r);
        }
    });

    resultsBox.innerHTML = `
        ${renderGroup("🎮 Games", groups.game)}
        ${renderGroup("🏢 Developers", groups.developer)}
        ${renderGroup("📚 Publishers", groups.publisher)}
        ${renderGroup("🧬 Franchises", groups.franchise)}
        ${renderGroup("🕹 Platforms", groups.platform)}
    `;
}

function renderGroup(title, items) {

    if (!items.length) return "";

    return `
        <div style="padding:8px 10px; font-size:12px; opacity:0.6;">
            ${typeIcons[title.split(" ")[1]?.toLowerCase()] || title}
        </div>

        ${items.map(r => `
            <a class="search-item" href="${r.link}">
                <div>${r.name}</div>
            </a>
        `).join("")}
    `;
}

/* -----------------------------
   CLICK OUTSIDE TO CLOSE
----------------------------- */
document.addEventListener("click", (e) => {
    if (!document.querySelector(".search-wrapper").contains(e.target)) {
        resultsBox.style.display = "none";
    }
});
</script>

</body>
</html>
