<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Franchise</title>

<style>
body {
    font-family: Arial;
    background: #0f0f14;
    color: white;
    margin: 0;
}

header {
    padding: 20px;
    background: #1a1a24;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1f1f2b;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
}

a {
    color: #7ab7ff;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
    <a href="index.html">← Home</a>
</header>

<div class="container" id="content">Loading...</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");

fetch("database.json")
.then(res => res.json())
.then(db => {

    const franchise = db.franchises.find(f => f.id === id);

    if (!franchise) {
        document.getElementById("content").innerHTML = "Franchise not found";
        return;
    }

    const games = db.games.filter(g => g.franchise === id);

    document.getElementById("content").innerHTML = `
        <h1>${franchise.name}</h1>
        <p><strong>Games:</strong> ${games.length}</p>

        <h3>Games</h3>

        ${games.map(g => `
            <div class="card">
                <a href="game.html?id=${g.id}">${g.title}</a>
            </div>
        `).join("")}
    `;
});
</script>

</body>
</html>
